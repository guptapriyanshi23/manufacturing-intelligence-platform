  #   uses: ./.github/workflows/Frontend_docker_deploy.yml
  #   with:
  #     environment: "prod"
  #     image_name: "${{ fromJson(vars.APP_INFO_PRD).application_name}}-ui-prd"
  #     acr_name: "${{ fromJson(vars.APP_INFO_PRD).ui_acr_name}}"
  #   secrets:
  #     azure_creds: ${{ secrets.AZURE_CREDENTIALS_PRD }}
