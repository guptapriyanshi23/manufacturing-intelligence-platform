  #   uses: ./.github/workflows/Backend_docker_deploy.yml
  #   with:
  #     environment: "prod"
  #     image_name: "${{ fromJson(vars.APP_INFO_PRD).application_name}}-api-prd"
  #     acr_name: "${{ fromJson(vars.APP_INFO_PRD).api_acr_name}}"
  #   secrets:
  #     azure_creds: ${{ secrets.AZURE_CREDENTIALS_PRD }}